baseURL = "https://go.isolatedcommand.com/"
title = "Go — Open Source URL Shortener by Isolated Command DevComm"
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/isolatedcommand/Publisher"

[markup.goldmark.renderer]
unsafe = true

[params]
logo_text = "Go"
logo_width = "120px"
# Header brand: rendered as  logo_sub | logo  (sub on the left, main on the right).
logo_sub = "images/logo_sub.png"
logo = "images/logo.png"
copyright = "This website is built with [Publisher](https://publisher.devcomm.isolatedcommand.com) by [Isolated Command Developer Community](https://devcomm.isolatedcommand.com)"
description = "A free, open-source URL shortener on Cloudflare Workers — provided by the Isolated Command Developer Community (DevComm). Generally available, no account required."
navbar_fixed = true

[[params.navbar_buttons]]
label = "GitHub ↗"
link = "https://github.com/isolatedcommand/Go"
style = "outline"

[[menu.main]]
name = "Search"
url = "/search/"
weight = 1

[[menu.main]]
name = "Docs"
url = "/docs/"
weight = 2

[[menu.main]]
name = "Links"
url = "/links/"
weight = 3

[[menu.main]]
name = "Admin"
url = "/admin/"
weight = 4

